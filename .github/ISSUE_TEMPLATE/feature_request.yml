name: 特性请求
about: 为 Fileview 提出新功能或改进建议
title: '[Feature Request] '
labels: ['Feature Request']
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您为 Fileview 提出改进建议！

  - type: textarea
    id: feature-description
    attributes:
      label: 🌟 特性描述
      description: 请详细描述您想要的特性和功能
      placeholder: 请详细描述您希望添加的功能...
    validations:
      required: true

  - type: textarea
    id: problem-solution
    attributes:
      label: 💡 解决的问题
      description: 这个特性能解决什么问题或带来什么价值？
      placeholder: 这个特性可以帮助...
    validations:
      required: true

  - type: textarea
    id: implementation-ideas
    attributes:
      label: 🛠️ 实现思路
      description: 如果您有实现的想法或建议，请在这里分享
      placeholder: 可以考虑使用...技术实现

  - type: textarea
    id: additional-context
    attributes:
      label: 📎 附加信息
      description: 任何其他相关信息或上下文
      placeholder: 相关的文档链接、示例等...